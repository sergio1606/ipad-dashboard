<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Painel da Cozinha</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101820;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: -webkit-linear-gradient(top, #142536 0%, #0b1118 100%);
      background: linear-gradient(to bottom, #142536 0%, #0b1118 100%);
    }

    .dashboard {
      height: 100%;
      padding: 26px 34px 22px;
      box-sizing: border-box;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
    }

    .top {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
      -webkit-box-align: start;
      -webkit-align-items: flex-start;
      align-items: flex-start;
    }

    .time {
      font-size: 112px;
      line-height: 0.9;
      font-weight: 200;
      letter-spacing: -5px;
    }

    .date {
      margin-top: 14px;
      font-size: 26px;
      font-weight: 300;
      opacity: 0.82;
      text-transform: capitalize;
    }

    .place {
      text-align: right;
      font-size: 22px;
      opacity: 0.78;
      padding-top: 8px;
    }

    .weather {
      margin-top: 32px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 24px 28px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
    }

    .weather-icon {
      width: 120px;
      text-align: center;
      font-size: 74px;
      line-height: 1;
    }

    .temperature {
      font-size: 78px;
      font-weight: 200;
      line-height: 1;
      min-width: 190px;
    }

    .condition {
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .details {
      font-size: 20px;
      opacity: 0.72;
      line-height: 1.5;
    }

    .forecast {
      margin-top: 24px;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    .calendar {
      margin-top: 24px;
      padding: 20px 24px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
    }

    .calendar-title {
      font-size: 15px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 12px;
    }

    .event {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 8px 0;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 18px;
    }
    .event:first-child { border-top: 0; }

    .event-when {
      width: 170px;
      opacity: 0.72;
      font-size: 15px;
      text-transform: capitalize;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    .event-title {
      -webkit-box-flex: 1;
      -webkit-flex: 1 1 auto;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .event-empty {
      opacity: 0.55;
      font-size: 15px;
      padding: 4px 0;
    }

    .day {
      width: 18%;
      text-align: center;
      padding: 16px 5px;
      box-sizing: border-box;
      background: rgba(255,255,255,0.045);
      border-radius: 14px;
    }

    .day-name {
      font-size: 18px;
      opacity: 0.76;
      text-transform: capitalize;
    }

    .day-icon {
      font-size: 35px;
      margin: 8px 0;
    }

    .day-temp {
      font-size: 18px;
    }

    .footer {
      margin-top: auto;
      padding-top: 18px;
      font-size: 14px;
      opacity: 0.48;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: justify;
      -webkit-justify-content: space-between;
      justify-content: space-between;
    }

    .error {
      color: #ffd7a6;
    }

    @media (orientation: portrait) {
      .time { font-size: 90px; }
      .weather { margin-top: 24px; }
      .forecast { margin-top: 18px; }
      .dashboard { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="top">
      <div>
        <div id="time" class="time">--:--</div>
        <div id="date" class="date">Carregando...</div>
      </div>
      <div class="place">São Pedro da Aldeia<br>Rio de Janeiro</div>
    </div>

    <div class="weather">
      <div id="weatherIcon" class="weather-icon">☀️</div>
      <div id="temperature" class="temperature">--°</div>
      <div>
        <div id="condition" class="condition">Carregando previsão...</div>
        <div class="details">
          Sensação: <span id="feels">--°</span><br>
          Umidade: <span id="humidity">--%</span> &nbsp;·&nbsp;
          Vento: <span id="wind">-- km/h</span>
        </div>
      </div>
    </div>

    <div id="forecast" class="forecast"></div>

    <div class="calendar">
      <div class="calendar-title">Próximos eventos</div>
      <div id="events"><div class="event-empty">Carregando agenda...</div></div>
    </div>

    <div class="footer">
      <span id="status">Atualização automática a cada 30 minutos</span>
      <span>Dados meteorológicos: Open-Meteo</span>
    </div>
  </div>

  <script>
    (function () {
      // São Pedro da Aldeia, RJ
      var LATITUDE = -22.8362;
      var LONGITUDE = -42.1037;
      var API =
        "https://api.open-meteo.com/v1/forecast" +
        "?latitude=" + LATITUDE +
        "&longitude=" + LONGITUDE +
        "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m" +
        "&daily=weather_code,temperature_2m_max,temperature_2m_min" +
        "&timezone=America%2FSao_Paulo" +
        "&forecast_days=5";

      var dayNames = ["domingo", "segunda-feira", "terça-feira", "quarta-feira", "quinta-feira", "sexta-feira", "sábado"];
      var monthNames = ["janeiro", "fevereiro", "março", "abril", "maio", "junho",
                        "julho", "agosto", "setembro", "outubro", "novembro", "dezembro"];

      function pad(n) {
        return n < 10 ? "0" + n : String(n);
      }

      function updateClock() {
        var now = new Date();
        document.getElementById("time").innerHTML = pad(now.getHours()) + ":" + pad(now.getMinutes());
        document.getElementById("date").innerHTML =
          dayNames[now.getDay()] + ", " + now.getDate() + " de " + monthNames[now.getMonth()];
      }

      function weatherInfo(code) {
        if (code === 0) return ["☀️", "Céu limpo"];
        if (code === 1) return ["🌤️", "Predominantemente limpo"];
        if (code === 2) return ["⛅", "Parcialmente nublado"];
        if (code === 3) return ["☁️", "Nublado"];
        if (code === 45 || code === 48) return ["🌫️", "Neblina"];
        if (code === 51 || code === 53 || code === 55) return ["🌦️", "Garoa"];
        if (code === 56 || code === 57) return ["🌧️", "Garoa congelante"];
        if (code === 61 || code === 63 || code === 65) return ["🌧️", "Chuva"];
        if (code === 66 || code === 67) return ["🌧️", "Chuva congelante"];
        if (code === 71 || code === 73 || code === 75 || code === 77) return ["❄️", "Neve"];
        if (code === 80 || code === 81 || code === 82) return ["🌦️", "Pancadas de chuva"];
        if (code === 85 || code === 86) return ["🌨️", "Pancadas de neve"];
        if (code === 95 || code === 96 || code === 99) return ["⛈️", "Trovoadas"];
        return ["🌡️", "Condição variável"];
      }

      function setStatus(text, isError) {
        var el = document.getElementById("status");
        el.innerHTML = text;
        el.className = isError ? "error" : "";
      }

      function renderWeather(data) {
        var current = data.current;
        var info = weatherInfo(current.weather_code);

        document.getElementById("weatherIcon").innerHTML = info[0];
        document.getElementById("temperature").innerHTML = Math.round(current.temperature_2m) + "°";
        document.getElementById("condition").innerHTML = info[1];
        document.getElementById("feels").innerHTML = Math.round(current.apparent_temperature) + "°";
        document.getElementById("humidity").innerHTML = Math.round(current.relative_humidity_2m) + "%";
        document.getElementById("wind").innerHTML = Math.round(current.wind_speed_10m) + " km/h";

        var html = "";
        var i;
        for (i = 0; i < data.daily.time.length; i++) {
          var dateParts = data.daily.time[i].split("-");
          var d = new Date(Number(dateParts[0]), Number(dateParts[1]) - 1, Number(dateParts[2]));
          var dailyInfo = weatherInfo(data.daily.weather_code[i]);
          html +=
            '<div class="day">' +
              '<div class="day-name">' + (i === 0 ? "hoje" : dayNames[d.getDay()].replace("-feira", "")) + '</div>' +
              '<div class="day-icon">' + dailyInfo[0] + '</div>' +
              '<div class="day-temp">' +
                Math.round(data.daily.temperature_2m_max[i]) + '° / ' +
                Math.round(data.daily.temperature_2m_min[i]) + '°' +
              '</div>' +
            '</div>';
        }
        document.getElementById("forecast").innerHTML = html;

        var now = new Date();
        setStatus("Atualizado às " + pad(now.getHours()) + ":" + pad(now.getMinutes()), false);
      }

      function loadWeather() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", API, true);
        xhr.timeout = 15000;

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status >= 200 && xhr.status < 300) {
              try {
                renderWeather(JSON.parse(xhr.responseText));
              } catch (e) {
                setStatus("Não foi possível interpretar os dados meteorológicos.", true);
              }
            } else {
              setStatus("Sem conexão com a previsão. Nova tentativa em 30 minutos.", true);
            }
          }
        };

        xhr.onerror = function () {
          setStatus("Sem conexão com a previsão. Nova tentativa em 30 minutos.", true);
        };

        xhr.ontimeout = function () {
          setStatus("A previsão demorou para responder. Nova tentativa automática.", true);
        };

        xhr.send();
      }

      updateClock();
      loadWeather();

      setInterval(updateClock, 1000);
      setInterval(loadWeather, 30 * 60 * 1000);

      /* -------- Google Calendar (public ICS via CORS proxy) -------- */
      var ICS_URL = "https://calendar.google.com/calendar/ical/sergio.matta%40sdm-consultoria.com/public/basic.ics";
      var PROXY = "https://api.allorigins.win/raw?url=";
      var MAX_EVENTS = 6;

      function parseIcsDate(v) {
        // Handles YYYYMMDD, YYYYMMDDTHHMMSS, YYYYMMDDTHHMMSSZ
        if (!v) return null;
        var allDay = v.length === 8;
        var y = parseInt(v.substring(0, 4), 10);
        var mo = parseInt(v.substring(4, 6), 10) - 1;
        var d = parseInt(v.substring(6, 8), 10);
        if (allDay) return { date: new Date(y, mo, d), allDay: true };
        var h = parseInt(v.substring(9, 11), 10);
        var mi = parseInt(v.substring(11, 13), 10);
        var s = parseInt(v.substring(13, 15), 10);
        var isUtc = v.charAt(v.length - 1) === "Z";
        var dt = isUtc ? new Date(Date.UTC(y, mo, d, h, mi, s)) : new Date(y, mo, d, h, mi, s);
        return { date: dt, allDay: false };
      }

      function unfoldIcs(text) {
        // RFC5545: lines starting with space/tab are continuations
        var lines = text.replace(/\r\n/g, "\n").split("\n");
        var out = [];
        for (var i = 0; i < lines.length; i++) {
          var ln = lines[i];
          if ((ln.charAt(0) === " " || ln.charAt(0) === "\t") && out.length) {
            out[out.length - 1] += ln.substring(1);
          } else {
            out.push(ln);
          }
        }
        return out;
      }

      function parseIcs(text) {
        var lines = unfoldIcs(text);
        var events = [];
        var cur = null;
        for (var i = 0; i < lines.length; i++) {
          var ln = lines[i];
          if (ln === "BEGIN:VEVENT") { cur = {}; continue; }
          if (ln === "END:VEVENT") {
            if (cur && cur.start && cur.summary) events.push(cur);
            cur = null; continue;
          }
          if (!cur) continue;
          // property may include params, e.g. DTSTART;VALUE=DATE:20260112
          var colon = ln.indexOf(":");
          if (colon < 0) continue;
          var keyPart = ln.substring(0, colon);
          var val = ln.substring(colon + 1);
          var key = keyPart.split(";")[0];
          if (key === "SUMMARY") {
            cur.summary = val.replace(/\\,/g, ",").replace(/\\n/gi, " ").replace(/\\;/g, ";");
          } else if (key === "DTSTART") {
            cur.start = parseIcsDate(val);
          }
        }
        return events;
      }

      function formatEventWhen(ev) {
        var d = ev.start.date;
        var now = new Date();
        var today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var evDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        var diff = Math.round((evDay - today) / 86400000);
        var when;
        if (diff === 0) when = "hoje";
        else if (diff === 1) when = "amanhã";
        else if (diff > 1 && diff < 7) when = dayNames[d.getDay()].replace("-feira", "");
        else when = pad(d.getDate()) + "/" + pad(d.getMonth() + 1);
        if (!ev.start.allDay) {
          when += " · " + pad(d.getHours()) + ":" + pad(d.getMinutes());
        }
        return when;
      }

      function escapeHtml(s) {
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function renderEvents(events) {
        var now = new Date();
        var upcoming = [];
        for (var i = 0; i < events.length; i++) {
          if (events[i].start.date >= now || sameDay(events[i].start.date, now)) upcoming.push(events[i]);
        }
        upcoming.sort(function (a, b) { return a.start.date - b.start.date; });
        upcoming = upcoming.slice(0, MAX_EVENTS);

        var el = document.getElementById("events");
        if (!upcoming.length) {
          el.innerHTML = '<div class="event-empty">Nenhum evento nos próximos dias</div>';
          return;
        }
        var html = "";
        for (var j = 0; j < upcoming.length; j++) {
          html +=
            '<div class="event">' +
              '<div class="event-when">' + formatEventWhen(upcoming[j]) + '</div>' +
              '<div class="event-title">' + escapeHtml(upcoming[j].summary) + '</div>' +
            '</div>';
        }
        el.innerHTML = html;
      }

      function sameDay(a, b) {
        return a.getFullYear() === b.getFullYear() &&
               a.getMonth() === b.getMonth() &&
               a.getDate() === b.getDate();
      }

      function loadCalendar() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", PROXY + encodeURIComponent(ICS_URL), true);
        xhr.timeout = 20000;
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) return;
          if (xhr.status >= 200 && xhr.status < 300) {
            try {
              renderEvents(parseIcs(xhr.responseText));
            } catch (e) {
              document.getElementById("events").innerHTML =
                '<div class="event-empty">Não foi possível ler a agenda</div>';
            }
          } else {
            document.getElementById("events").innerHTML =
              '<div class="event-empty">Agenda indisponível</div>';
          }
        };
        xhr.onerror = xhr.ontimeout = function () {
          document.getElementById("events").innerHTML =
            '<div class="event-empty">Agenda indisponível</div>';
        };
        xhr.send();
      }

      loadCalendar();
      setInterval(loadCalendar, 15 * 60 * 1000);
    }());
  </script>
</body>
</html>
